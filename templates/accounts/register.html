
    {% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Mediconnect{% endblock %}</title>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Custom CSS -->

    <link rel="stylesheet" href="{% static 'css/style.css' %}">
 
 </head>
<body class="auth-body">
 
<div class="glass-card auth-card">
    <h1>Join Us</h1>
    <p class="subtitle">Select your role and create your account</p>

    {% if messages %}
    <div class="messages">
        {% for message in messages %}
        <div class="alert alert-{{ message.tags }}">
            {{ message }}
        </div>
        {% endfor %}
    </div>
    {% endif %}

    <form method="POST" action="{% url 'register' %}">
        {% csrf_token %}
        
        <div class="role-tabs">
            <div class="role-tab active" data-role="PATIENT" onclick="setRole('PATIENT')">Patient</div>
            <div class="role-tab" data-role="DOCTOR" onclick="setRole('DOCTOR')">Doctor</div>
        </div>
        <input type="hidden" name="role" id="selected-role" value="PATIENT">

        <div class="form-group">
            <label>Username</label>
            <input type="text" name="username" placeholder="johndoe" required>
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" placeholder="john@example.com" required>
        </div>

        <div class="form-group">
            <label>Phone</label>
            <input type="text" name="phone" placeholder="+1234567890">
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" placeholder="••••••••" required>
        </div>

        <!-- Patient Specific Fields -->
        <div id="patient-fields">
            <div class="form-group">
                <label>Date of Birth</label>
                <input type="date" name="date_of_birth">
            </div>
            <div class="form-group">
                <label>Blood Group</label>
                <select name="blood_group">
                    <option value="">Select Group</option>
                    <option value="A+">A+</option>
                    <option value="A-">A-</option>
                    <option value="B+">B+</option>
                    <option value="B-">B-</option>
                    <option value="O+">O+</option>
                    <option value="O-">O-</option>
                    <option value="AB+">AB+</option>
                    <option value="AB-">AB-</option>
                </select>
            </div>
        </div>

        <!-- Doctor Specific Fields -->
        <div id="doctor-fields" style="display: none;">
            <div class="form-group">
                <label>Hospital</label>
                <select name="hospital">
                    <option value="">Select Hospital</option>
                    {% for hospital in hospitals %}
                    <option value="{{ hospital.id }}">{{ hospital.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>Specialization</label>
                <input type="text" name="specialization" placeholder="Cardiology">
            </div>
            <div class="form-group">
                <label>Experience (Years)</label>
                <input type="number" name="experience_years" value="0">
            </div>
        </div>

        <button type="submit" class="btn btn-primary">
            Create Account
        </button>
    </form>

    <div class="auth-footer">
        Already have an account? <a href="{% url 'login' %}">Login</a>
    </div>
</div>
 
 
<script>
function setRole(role) {
    document.getElementById('selected-role').value = role;
    
    // Update tabs
    document.querySelectorAll('.role-tab').forEach(tab => {
        tab.classList.remove('active');
        if(tab.dataset.role === role) tab.classList.add('active');
    });

    // Toggle fields
    const patientFields = document.getElementById('patient-fields');
    const doctorFields = document.getElementById('doctor-fields');
    
    if(role === 'PATIENT') {
        patientFields.style.display = 'block';
        doctorFields.style.display = 'none';
        
        // Update required attributes
        patientFields.querySelectorAll('input, select').forEach(el => {
            if(el.name === 'date_of_birth') el.required = true;
        });
        doctorFields.querySelectorAll('input, select').forEach(el => el.required = false);
    } else {
        patientFields.style.display = 'none';
        doctorFields.style.display = 'block';
        
        patientFields.querySelectorAll('input, select').forEach(el => el.required = false);
        doctorFields.querySelectorAll('input, select').forEach(el => {
            if(el.name === 'hospital' || el.name === 'specialization') el.required = true;
        });
    }
}

// Set initial required fields
setRole('PATIENT');
</script>
</body>
</html>
