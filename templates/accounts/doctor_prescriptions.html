{% extends 'accounts/doctor_dashboard.html' %}
{% block title %}Manage Prescriptions | Mediconnect{% endblock %}
{% block doctor_main %}
<div class="topbar">
  <div>
    <h1>Prescriptions</h1>
    <p>Manage patient prescriptions and diagnoses</p>
  </div>
</div>

<div class="table-section" style="margin-bottom: 30px;">
  <div class="table-header">
    <h2>Write New Prescription</h2>
  </div>
  <form method="POST" enctype="multipart/form-data" style="background: #f9fafb; padding: 20px; border-radius: 12px; border: 1px solid #e5e7eb;">
    {% csrf_token %}
    <input type="hidden" name="action" value="create">
    <div style="margin-bottom: 15px;">
      <label style="display: block; margin-bottom: 5px; font-weight: 500;">Select Completed Appointment</label>
      <select name="appointment_id" required style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #d1d5db; font-family: inherit;">
        <option value="">-- Select Appointment --</option>
        {% for appt in appointments %}
        <option value="{{ appt.id }}">{{ appt.patient.user.username }} - {{ appt.appointment_date }} ({{ appt.symptoms|truncatechars:20 }})</option>
        {% endfor %}
      </select>
    </div>
    <div style="margin-bottom: 15px;">
      <label style="display: block; margin-bottom: 5px; font-weight: 500;">Diagnosis</label>
      <input type="text" name="diagnosis" required style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #d1d5db; font-family: inherit;">
    </div>
    <div style="margin-bottom: 15px;">
      <label style="display: block; margin-bottom: 5px; font-weight: 500;">Prescription</label>
      <textarea name="prescription" required rows="3" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #d1d5db; resize: vertical; font-family: inherit;"></textarea>
    </div>
    <div style="margin-bottom: 20px;">
      <label style="display: block; margin-bottom: 5px; font-weight: 500;">Attach File or Report (Optional)</label>
      <input type="file" name="file" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #d1d5db; font-family: inherit;">
    </div>
    <button type="submit" style="background: #1f6fff; color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: 500; cursor: pointer;">Save Prescription</button>
  </form>
</div>
{% endblock %}
